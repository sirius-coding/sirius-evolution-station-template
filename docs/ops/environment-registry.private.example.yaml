version: 1
visibility: "private-example"
owner: "sirius-coding"

environments:
  - id: "cloud-integration"
    purpose: "integration-and-smoke"
    ssh:
      alias: "<private-ssh-alias>"
      host: "<private-host-or-ip>"
      user: "<private-ssh-user>"
    paths:
      workspace_root: "<remote-workspace-root>"
      backend_dir: "<remote-backend-dir>"
      frontend_dir: "<remote-frontend-dir>"
    services:
      - name: "<backend-service-name>"
        kind: "backend"
        public_port: "<backend-public-port>"
        health_path: "/actuator/health"
      - name: "<frontend-service-name>"
        kind: "frontend"
        public_port: "<frontend-public-port>"
      - name: "<database-service-name>"
        kind: "database"
        public_port: "<database-public-port>"
        internal_db: "<database-name>"
    notes:
      - "copy this file to docs/ops/environment-registry.private.yaml and fill real values locally"
      - "never commit the private file"
