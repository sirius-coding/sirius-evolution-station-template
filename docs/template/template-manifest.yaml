version: 1
template_repository: "sirius-coding/sirius-evolution-station-template"
upstream_repository: "sirius-coding/sirius-evolution-station-template"
official_adopter_repository: "sirius-coding/sirius-workstation"
current_version: "5.0.0"
visibility: "public"

include:
  root_files:
    - ".gitignore"
    - "AGENTS.md"
    - "CHANGELOG.md"
    - "COMMERCIALIZATION.md"
    - "CONTRIBUTING.md"
    - "LICENSE"
    - "NOTICE"
    - "README.md"
    - "SECURITY.md"
    - "VERSION"
  directories:
    - ".codex"
    - ".github"
    - "assets"
    - "docs"
    - "examples"
    - "scripts"
    - "skills"
    - "specs"

exclude:
  paths:
    - "projects"
    - "pom.xml"
    - ".github/workflows/sync-template.yml"
    - ".github/java-upgrade"
    - "docs/workstation"
    - "docs/superpowers"
    - "docs/ops/environment-registry.private.yaml"
    - ".worktrees"
    - ".git"
    - "target"
    - "node_modules"

release_policy:
  template_repository: "public reusable upstream"
  adopter_repository: "source of reusable lessons"
  sync_trigger: "accepted upstream reusable capability"
  business_project_policy: "exclude projects/ and independent repository implementation updates"
