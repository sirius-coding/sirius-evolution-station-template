<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Sirius Coding Evolution Station</title>
  <desc id="desc">A technology banner with an orbital Sirius star mark, system nodes, and evolution station branding.</desc>
  <defs>
    <linearGradient id="bg" x1="72" y1="0" x2="1128" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#04111F"/>
      <stop offset="0.52" stop-color="#08233B"/>
      <stop offset="1" stop-color="#0E3A4D"/>
    </linearGradient>
    <linearGradient id="scan" x1="80" y1="54" x2="1120" y2="312" gradientUnits="userSpaceOnUse">
      <stop stop-color="#7DD3FC"/>
      <stop offset="0.48" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#A7F3D0"/>
    </linearGradient>
    <linearGradient id="star" x1="830" y1="64" x2="1025" y2="260" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8FAFC"/>
      <stop offset="0.42" stop-color="#7DD3FC"/>
      <stop offset="1" stop-color="#34D399"/>
    </linearGradient>
    <radialGradient id="halo" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(920 172) rotate(90) scale(156)">
      <stop stop-color="#7DD3FC" stop-opacity="0.48"/>
      <stop offset="0.58" stop-color="#22D3EE" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.19 0 0 0 0 0.82 0 0 0 0 0.89 0 0 0 1 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" stroke="#BAE6FD" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" rx="28" fill="url(#bg)"/>
  <rect x="28" y="28" width="1144" height="304" rx="24" fill="url(#grid)"/>
  <path d="M76 288C228 174 378 150 532 212C670 268 800 264 946 186C1020 146 1080 96 1124 58" stroke="url(#scan)" stroke-width="3" stroke-linecap="round" opacity="0.7"/>
  <path d="M78 312C246 214 390 202 518 246C646 290 792 296 956 236C1036 207 1090 170 1126 136" stroke="#E0F2FE" stroke-opacity="0.16" stroke-width="2" stroke-linecap="round"/>

  <g opacity="0.6">
    <path d="M720 88H850M746 118H826M680 270H818M704 240H780" stroke="#BAE6FD" stroke-opacity="0.38" stroke-width="2" stroke-linecap="round"/>
    <circle cx="862" cy="88" r="5" fill="#A7F3D0"/>
    <circle cx="838" cy="118" r="5" fill="#38BDF8"/>
    <circle cx="832" cy="270" r="5" fill="#C4B5FD"/>
    <circle cx="794" cy="240" r="5" fill="#67E8F9"/>
  </g>

  <g transform="translate(112 74)">
    <text x="0" y="18" fill="#A7F3D0" font-size="16" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" letter-spacing="4">SIRIUS CODING</text>
    <text x="0" y="86" fill="#F8FAFC" font-size="52" font-weight="760" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Evolution Station</text>
    <text x="0" y="132" fill="#BAE6FD" font-size="22" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Rules, skills, release evidence, and project memory.</text>
    <g transform="translate(0 168)">
      <rect width="170" height="38" rx="19" fill="#0EA5E9" fill-opacity="0.18" stroke="#7DD3FC" stroke-opacity="0.45"/>
      <text x="22" y="25" fill="#E0F2FE" font-size="14" font-weight="650" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Workspace root</text>
      <rect x="188" width="154" height="38" rx="19" fill="#10B981" fill-opacity="0.16" stroke="#A7F3D0" stroke-opacity="0.42"/>
      <text x="210" y="25" fill="#D1FAE5" font-size="14" font-weight="650" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">Open source</text>
      <rect x="360" width="150" height="38" rx="19" fill="#6366F1" fill-opacity="0.16" stroke="#C4B5FD" stroke-opacity="0.42"/>
      <text x="382" y="25" fill="#E0E7FF" font-size="14" font-weight="650" font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">AI systems</text>
    </g>
  </g>

  <g transform="translate(770 42)">
    <circle cx="150" cy="132" r="150" fill="url(#halo)"/>
    <ellipse cx="150" cy="132" rx="128" ry="54" transform="rotate(-18 150 132)" stroke="url(#scan)" stroke-width="3"/>
    <ellipse cx="150" cy="132" rx="94" ry="38" transform="rotate(24 150 132)" stroke="#E0F2FE" stroke-opacity="0.28" stroke-width="2"/>
    <circle cx="150" cy="132" r="52" fill="#061827" stroke="#7DD3FC" stroke-opacity="0.8" stroke-width="2"/>
    <path d="M150 76L166 113L206 116L176 142L185 181L150 160L115 181L124 142L94 116L134 113L150 76Z" fill="url(#star)" filter="url(#softGlow)"/>
    <circle cx="266" cy="92" r="8" fill="#A7F3D0"/>
    <circle cx="68" cy="184" r="7" fill="#38BDF8"/>
    <circle cx="242" cy="204" r="6" fill="#C4B5FD"/>
    <path d="M218 62L246 44M54 210L30 230M248 210L278 238" stroke="#BAE6FD" stroke-opacity="0.32" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
